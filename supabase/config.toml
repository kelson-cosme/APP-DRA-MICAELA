
[functions.cloudflare-video-info]
enabled = true
verify_jwt = true
import_map = "./functions/cloudflare-video-info/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/cloudflare-video-info/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/cloudflare-video-info/*.html" ]

[functions.chat-with-dra]
enabled = true
verify_jwt = false
import_map = "./functions/chat-with-dra/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/chat-with-dra/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/chat-with-dra/*.html" ]
